# docker-compose.yml
# Optional: Use PostgreSQL instead of SQLite for production
# Change DB_URL to: postgresql://chainpulse:chainpulse_dev@localhost:5432/chainpulse

version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: chainpulse_db
    environment:
      POSTGRES_USER: chainpulse
      POSTGRES_PASSWORD: chainpulse_dev
      POSTGRES_DB: chainpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chainpulse_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chainpulse.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
